services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: opsdesk
      POSTGRES_PASSWORD: opsdesk
      POSTGRES_DB: opsdesk_ai
    ports:
      - "55432:5432"
    volumes:
      - opsdesk_postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsdesk -d opsdesk_ai"]
      interval: 5s
      timeout: 5s
      retries: 8

  redpanda:
    image: redpandadata/redpanda:v24.3.6
    profiles: ["events"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - opsdesk_redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    profiles: ["search"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: opsdesk-Local-Only-1!
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opsdesk_opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5.26-community
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: neo4j/opsdesk-local-graph
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - opsdesk_neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  opsdesk_postgres:
  opsdesk_redpanda:
  opsdesk_opensearch:
  opsdesk_neo4j:
