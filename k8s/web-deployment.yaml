apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsdesk-ai-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opsdesk-ai
      component: web
  template:
    metadata:
      labels:
        app: opsdesk-ai
        component: web
    spec:
      containers:
        - name: web
          image: example.invalid/opsdesk-ai:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: opsdesk-ai-config
            - secretRef:
                name: opsdesk-ai-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
